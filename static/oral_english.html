<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oral English - Voice Practice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c15;--surface:#12131f;--surface2:#191a2a;--border:#252744;--accent:#6366f1;--text:#dde0f2;--text2:#8b8eaa;--text3:#4f5270;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--sans:system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px 20px}
#status-icon{font-size:64px;transition:transform .3s}
#status-icon.ringing{animation:pulse-icon 1s infinite}
@keyframes pulse-icon{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#status-text{font-size:16px;color:var(--text2);text-align:center;min-height:24px}
#timer{font-family:monospace;font-size:24px;color:var(--accent);display:none}
#user-text{font-size:14px;color:var(--accent-hi);text-align:center;min-height:20px;max-width:500px;line-height:1.5}
#call-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;font-size:32px;transition:all .2s;display:flex;align-items:center;justify-content:center}
#call-btn.start{background:var(--green);color:#fff}
#call-btn.start:hover{transform:scale(1.08)}
#call-btn.end{background:var(--red);color:#fff}
#transcript{width:100%;max-width:600px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:8px}
#transcript::-webkit-scrollbar{width:3px}
#transcript::-webkit-scrollbar-thumb{background:var(--border)}
.trans-line{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;animation:fade-in .3s}
.trans-line.teacher{background:var(--surface);border-left:3px solid var(--green)}
.trans-line.student{background:var(--surface2);border-left:3px solid var(--accent)}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#back-btn{position:fixed;top:16px;left:16px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;text-decoration:none}
#back-btn:hover{color:var(--text)}
</style>
</head>
<body>
<a href="/" id="back-btn">← 返回</a>
<div id="app">
  <div id="status-icon">🎧</div>
  <div id="status-text">Ready</div>
  <div id="timer">00:00</div>
  <div id="user-text"></div>
  <div style="display:flex;gap:16px;align-items:center">
    <button id="call-btn" class="start" onclick="toggleCall()">📞</button>
  </div>
  <div id="transcript"></div>
</div>

<script>
const API = window.location.origin;
let authToken = localStorage.getItem('auth_token');
let ws = null, audioCtx = null, playbackCtx = null, isCalling = false, callStartTime = 0, timerInterval = null;

(async function(){
  if (!authToken) { location.href = '/'; return; }
  const r = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${authToken}` } });
  if (!r.ok) { location.href = '/'; return; }
})();

async function toggleCall(){
  if (isCalling) { endCall(); } else { await startCall(); }
}

let micStream = null, micNode = null;

async function startCall(){
  try {
    // Audio context for mic capture (16kHz)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    // Separate context for playback — MUST match Volc TTS sample rate (24000)
    playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

    // Mic capture
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    const source = audioCtx.createMediaStreamSource(micStream);
    micNode = audioCtx.createScriptProcessor(1024, 1, 1);
    source.connect(micNode);
    const zg = audioCtx.createGain(); zg.gain.value = 0;
    micNode.connect(zg); zg.connect(audioCtx.destination);

    // WebSocket
    const wsUrl = `${API.replace('http','ws')}/ws/voice/oral_english?token=${authToken}`;
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';
    let wsReady = false;

    ws.onopen = () => console.log('[voice] WS opened');
    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        let msg; try { msg = JSON.parse(event.data) } catch(e) { return }
        if (!wsReady) {
          if (msg.type === 'ready') {
            wsReady = true; isCalling = true; callStartTime = Date.now();
            updateUI('connected'); startTimer();
            setStatus('已连接，开始说话吧！');
          } else if (msg.type === 'error') { setStatus('失败: ' + msg.message); }
          return;
        }
        handleMessage(msg);
      } else {
        if (wsReady) playAudio(event.data);
      }
    };
    ws.onerror = () => { endCall(); };
    ws.onclose = () => { if (isCalling) endCall(); };

    // Send mic audio continuously
    micNode.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const input = e.inputBuffer.getChannelData(0);
      const buf = new ArrayBuffer(input.length * 2);
      const view = new DataView(buf);
      for (let i = 0; i < input.length; i++) {
        let s = Math.max(-1, Math.min(1, input[i]));
        view.setInt16(i*2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      ws.send(buf);
    };

  } catch(e) { console.error(e); setStatus('需要麦克风权限'); endCall(); }
}

function endCall(){
  isCalling = false;
  if (ws) { try { ws.close() } catch(e) {}; ws = null; }
  if (micNode) { micNode.disconnect(); micNode = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  if (playbackCtx) { playbackCtx.close().catch(()=>{}); playbackCtx = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  updateUI('idle');
}

// ─── Audio playback ─────────────────────────────────────

let audioChunks = 0;
function playAudio(arraybuffer){
  if (!playbackCtx || playbackCtx.state === 'closed') return;
  audioChunks++;
  try {
    const pcm = new Int16Array(arraybuffer);
    if (audioChunks <= 3) console.log(`[voice] play audio #${audioChunks}: ${pcm.length} samples, first=[${pcm[0]},${pcm[1]},${pcm[2]}]`);
    const buffer = playbackCtx.createBuffer(1, pcm.length, 24000);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < pcm.length; i++) data[i] = pcm[i] / 32768;
    const source = playbackCtx.createBufferSource();
    source.buffer = buffer; source.connect(playbackCtx.destination); source.start();
  } catch(e) { console.error('[voice] play err:', e); }
}

// ─── UI ─────────────────────────────────────────────────

function handleMessage(msg){
  console.log('[voice] handle:', msg.type, msg);
  if (msg.type === 'chat_text') addTranscript('teacher', msg.content || '');
  if (msg.type === 'tts_start' && msg.text) addTranscript('teacher', msg.text);
  if (msg.type === 'asr') { document.getElementById('user-text').textContent = msg.text || ''; if (msg.text) addTranscript('student', msg.text); }
}

function addTranscript(role, text){
  const el = document.getElementById('transcript');
  const line = document.createElement('div');
  line.className = 'trans-line ' + role; line.textContent = text;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}

function updateUI(state){
  const icon = document.getElementById('status-icon');
  const callBtn = document.getElementById('call-btn');
  const timer = document.getElementById('timer');
  if (state === 'connected'){
    icon.textContent = '🗣️'; icon.classList.add('ringing');
    callBtn.className = 'end'; callBtn.textContent = '📞';
    timer.style.display = 'block';
  } else {
    icon.textContent = '🎧'; icon.classList.remove('ringing');
    callBtn.className = 'start'; callBtn.textContent = '📞';
    timer.style.display = 'none';
    setStatus('Ready'); document.getElementById('user-text').textContent = '';
  }
}

function setStatus(t){ document.getElementById('status-text').textContent = t; }
function startTimer(){
  timerInterval = setInterval(() => {
    const e = Math.floor((Date.now() - callStartTime) / 1000);
    document.getElementById('timer').textContent = String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
  }, 1000);
}
</script>
</body>
</html>
