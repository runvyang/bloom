<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oral English - Voice Practice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c15;--surface:#12131f;--surface2:#191a2a;--border:#252744;--accent:#6366f1;--text:#dde0f2;--text2:#8b8eaa;--text3:#4f5270;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--sans:system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;padding:0}
#top-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#status-icon{font-size:24px;transition:transform .3s}
#status-icon.ringing{animation:pulse-icon 1s infinite}
@keyframes pulse-icon{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#status-text{font-size:12px;color:var(--text2);flex:1}
#timer{font-family:monospace;font-size:14px;color:var(--accent);display:none}
#call-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:20px;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#call-btn.start{background:var(--green);color:#fff}
#call-btn.end{background:var(--red);color:#fff}
#transcript{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:12px 14px;max-width:700px;width:100%;margin:0 auto}
#transcript::-webkit-scrollbar{width:3px}
#transcript::-webkit-scrollbar-thumb{background:var(--border)}
.trans-line{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;animation:fade-in .3s;max-width:85%}
.trans-line.teacher{align-self:flex-end;background:var(--accent);color:#fff;border-radius:12px 12px 2px 12px}
.trans-line.student{align-self:flex-start;background:var(--surface2);border-radius:12px 12px 12px 2px}
.trans-line.streaming{opacity:.7}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#settings-panel{position:fixed;top:48px;right:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;width:240px;display:none;z-index:100}
#settings-panel.show{display:block}
.setting-row{margin-bottom:12px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.setting-row select,.setting-row input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;outline:none}
.setting-row input[type=range]{padding:0;height:24px;-webkit-appearance:none;background:transparent}
.setting-row input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--border);border-radius:2px}
.setting-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;margin-top:-5px}
.setting-val{font-size:10px;color:var(--text3);float:right}
</style>
</head>
<body>
<div id="settings-panel">
  <div class="setting-row">
    <div class="setting-label">音色 Voice</div>
    <select id="voice-sel" onchange="updateVoice()">
      <option value="zh_female_vv_jupiter_bigtts">vv · 活泼灵动女声</option>
      <option value="zh_female_xiaohe_jupiter_bigtts">xiaohe · 甜美女声</option>
      <option value="zh_male_yunzhou_jupiter_bigtts">yunzhou · 清爽男声</option>
      <option value="zh_male_xiaotian_jupiter_bigtts">xiaotian · 磁性男声</option>
      <option value="en_female_dacey_uranus_bigtts">Dacey · 美式英语女声</option>
      <option value="en_male_tim_uranus_bigtts">Tim · 美式英语男声</option>
    </select>
  </div>
  <div class="setting-row">
    <div class="setting-label">语速 Speed <span class="setting-val" id="speed-val">0.92x</span></div>
    <input type="range" id="speed-slider" min="0.6" max="1.2" step="0.02" value="0.92" oninput="updateSpeed()">
  </div>
</div>
<div id="app">
  <div id="top-bar">
    <a href="/" style="color:var(--text2);text-decoration:none;font-size:13px">←</a>
    <div id="status-icon">🎧</div>
    <span id="status-text">就绪</span>
    <span id="timer">00:00</span>
    <span style="flex:1"></span>
    <button id="call-btn" class="start" onclick="toggleCall()">📞</button>
    <button id="settings-btn" onclick="toggleSettings()" style="position:static;width:28px;height:28px;font-size:14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer">⚙</button>
  </div>
  <div id="transcript"></div>
</div>

<script>
const API = window.location.origin;
let authToken = localStorage.getItem('auth_token');
let ws = null, audioCtx = null, playbackCtx = null, isCalling = false, callStartTime = 0, timerInterval = null;

(async function(){
  if (!authToken) { location.href = '/'; return; }
  const r = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${authToken}` } });
  if (!r.ok) { location.href = '/'; return; }
})();

async function toggleCall(){
  if (isCalling) { endCall(); } else { await startCall(); }
}

let micStream = null, micNode = null;

async function startCall(){
  try {
    // Audio context for mic capture (16kHz)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    // Separate context for playback — MUST match Volc TTS sample rate (24000)
    playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

    // Mic capture
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    const source = audioCtx.createMediaStreamSource(micStream);
    micNode = audioCtx.createScriptProcessor(1024, 1, 1);
    source.connect(micNode);
    const zg = audioCtx.createGain(); zg.gain.value = 0;
    micNode.connect(zg); zg.connect(audioCtx.destination);

    // WebSocket
    const wsUrl = `${API.replace('http','ws')}/ws/voice/oral_english?token=${authToken}`;
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';
    let wsReady = false;

    ws.onopen = () => console.log('[voice] WS opened');
    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        let msg; try { msg = JSON.parse(event.data) } catch(e) { return }
        if (!wsReady) {
          if (msg.type === 'ready') {
            wsReady = true; isCalling = true; callStartTime = Date.now();
            updateUI('connected'); startTimer();
            setStatus('已连接，开始说话吧！');
          } else if (msg.type === 'error') { setStatus('失败: ' + msg.message); }
          return;
        }
        handleMessage(msg);
      } else {
        if (wsReady) playAudio(event.data);
      }
    };
    ws.onerror = () => { endCall(); };
    ws.onclose = () => { if (isCalling) endCall(); };

    // Send mic audio continuously
    micNode.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const input = e.inputBuffer.getChannelData(0);
      const buf = new ArrayBuffer(input.length * 2);
      const view = new DataView(buf);
      for (let i = 0; i < input.length; i++) {
        let s = Math.max(-1, Math.min(1, input[i]));
        view.setInt16(i*2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      ws.send(buf);
    };

  } catch(e) { console.error(e); setStatus('需要麦克风权限'); endCall(); }
}

function endCall(){
  isCalling = false; audioQueue = []; isPlaying = false;
  if (ws) { try { ws.close() } catch(e) {}; ws = null; }
  if (micNode) { micNode.disconnect(); micNode = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  if (playbackCtx) { playbackCtx.close().catch(()=>{}); playbackCtx = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  updateUI('idle');
}

// ─── Audio playback ─────────────────────────────────────

let audioQueue = [];
let isPlaying = false;

function playAudio(arraybuffer){
  audioQueue.push(arraybuffer);
  if (!isPlaying) playNextChunk();
}

function playNextChunk(){
  if (audioQueue.length === 0) { isPlaying = false; return; }
  isPlaying = true;
  if (!playbackCtx || playbackCtx.state === 'closed') return;
  if (playbackCtx.state === 'suspended') playbackCtx.resume();

  const arraybuffer = audioQueue.shift();
  try {
    const pcm = new Int16Array(arraybuffer);
    const buffer = playbackCtx.createBuffer(1, pcm.length, 24000);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < pcm.length; i++) data[i] = pcm[i] / 32768;
    const source = playbackCtx.createBufferSource();
    source.buffer = buffer; source.connect(playbackCtx.destination);
    source.playbackRate.value = getPlaybackRate();
    source.onended = () => playNextChunk();
    source.start();
  } catch(e) { console.error('[voice] play err:', e); isPlaying = false; }
}

// ─── UI ─────────────────────────────────────────────────

let streamingText = '';
let streamingEl = null;
let newTurn = true;  // start a fresh bubble for each teacher response

function handleMessage(msg){
  if (msg.type === 'chat_text') {
    if (newTurn) {
      // New conversation turn — start fresh bubble
      if (streamingEl) { streamingEl.classList.remove('streaming'); streamingEl = null; }
      streamingText = '';
      streamingEl = addTranscript('teacher', '', true);
      newTurn = false;
    }
    streamingText += (msg.content || '');
    if (streamingEl) streamingEl.textContent = streamingText;
    scrollTranscript();
  }
  if (msg.type === 'tts_ended') {
    if (streamingEl) { streamingEl.classList.remove('streaming'); streamingEl = null; streamingText = ''; }
  }
  if (msg.type === 'tts_start') {
    // tts_start marks beginning of a new turn
    newTurn = true;
  }
  if (msg.type === 'asr') {
    if (streamingEl) { streamingEl.classList.remove('streaming'); streamingEl = null; streamingText = ''; }
    if (msg.text) addTranscript('student', msg.text);
    newTurn = true;  // student spoke, next teacher response is new turn
  }
}

function addTranscript(role, text, streaming){
  const el = document.getElementById('transcript');
  const line = document.createElement('div');
  line.className = 'trans-line ' + role;
  if (streaming) line.classList.add('streaming');
  line.textContent = text;
  el.appendChild(line);
  scrollTranscript();
  return line;
}

function scrollTranscript(){
  const el = document.getElementById('transcript');
  el.scrollTop = el.scrollHeight;
}

function updateUI(state){
  const icon = document.getElementById('status-icon');
  const callBtn = document.getElementById('call-btn');
  const timer = document.getElementById('timer');
  if (state === 'connected'){
    icon.textContent = '🗣️'; icon.classList.add('ringing');
    callBtn.className = 'end'; callBtn.textContent = '📞';
    timer.style.display = 'block';
  } else {
    icon.textContent = '🎧'; icon.classList.remove('ringing');
    callBtn.className = 'start'; callBtn.textContent = '📞';
    timer.style.display = 'none';
    setStatus('就绪');
  }
}

// ─── Voice Settings ────────────────────────────────────

let voiceSettings = {
  speaker: localStorage.getItem('voice_speaker') || 'zh_female_vv_jupiter_bigtts',
  speed: parseFloat(localStorage.getItem('voice_speed') || '0.92')
};

function initSettings(){
  document.getElementById('voice-sel').value = voiceSettings.speaker;
  document.getElementById('speed-slider').value = voiceSettings.speed;
  document.getElementById('speed-val').textContent = voiceSettings.speed.toFixed(2) + 'x';
}

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('show');
}

function updateVoice(){
  voiceSettings.speaker = document.getElementById('voice-sel').value;
  localStorage.setItem('voice_speaker', voiceSettings.speaker);
  // If in a call, send UpdateConfig to server
  sendUpdateConfig();
}

function updateSpeed(){
  voiceSettings.speed = parseFloat(document.getElementById('speed-slider').value);
  document.getElementById('speed-val').textContent = voiceSettings.speed.toFixed(2) + 'x';
  localStorage.setItem('voice_speed', voiceSettings.speed);
  sendUpdateConfig();
}

function sendUpdateConfig(){
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'update_config',
      speaker: voiceSettings.speaker,
      speed: voiceSettings.speed
    }));
  }
}

// Apply speed to playback (used in playNextChunk)
function getPlaybackRate(){ return voiceSettings.speed; }

// Init on load
initSettings();

function startTimer(){
  timerInterval = setInterval(() => {
    const e = Math.floor((Date.now() - callStartTime) / 1000);
    document.getElementById('timer').textContent = String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
  }, 1000);
}
</script>
</body>
</html>
